<title>Word Styles Microlearning — Morgan Lewis Technology Instructor Demo (v4)</title>

<style>
  :root {
    --teal: #00CED1;
    --purple: #6B2D8B;

  .card { background: rgba(30,30,56,0.5); backdrop-filter: blur(10px); border-radius: 18px; border: 1px solid rgba(255,255,255,0.08); padding: 26px; margin-bottom: 18px; }
  .welcome { text-align: center; padding: 36px 24px; }
  .welcome h1 { font-size: 36px; font-weight: 800; margin-bottom: 12px; background: linear-gradient(135deg, var(--teal), var(--magenta)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .welcome .scenario { background: rgba(43,87,154,0.15); border: 1px solid rgba(43,87,154,0.4); border-radius: 14px; padding: 20px; margin: 22px auto; max-width: 720px; text-align: left; }

  .about-toggle { width: 100%; padding: 14px 20px; background: transparent; border: none; color: var(--text); font-size: 15px; font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }

  .word-comments, .word-share { font-size: 10px; padding: 3px 7px; border-radius: 3px; cursor: default; background: rgba(255,255,255,0.08); }
  .word-window-controls { display: flex; gap: 1px; margin-left: 4px; }

  .word-wc:hover { background: rgba(255,255,255,0.15); }
  .word-wc.close:hover { background: #e81123; }
  .word-styles-actions { background: var(--ribbon); border-bottom: 1px solid var(--ribbon-border); padding: 4px 14px; display: flex; gap: 18px; font-size: 11px; color: #333; }
  .action-link { display: flex; align-items: center; gap: 5px; cursor: default; }

  .word-menubar { background: white; padding: 3px 10px; border-bottom: 1px solid var(--ribbon-border); display: flex; gap: 14px; font-size: 11px; color: #444; }
  .word-menu { padding: 2px 5px; cursor: default; }
  .word-menu.active { color: var(--word-blue); border-bottom: 2px solid var(--word-blue); font-weight: 600; }
  .word-ribbon { background: var(--ribbon); border-bottom: 1px solid var(--ribbon-border); padding: 5px 6px; display: flex; gap: 0; min-height: 84px; overflow: hidden; }
  .ribbon-group { display: flex; flex-direction: column; padding: 0 6px; border-right: 1px solid var(--ribbon-border); position: relative; }

  .ribbon-group-content { flex: 1; display: flex; gap: 3px; align-items: center; }
  .ribbon-group-label { font-size: 9px; color: #555; text-align: center; padding-top: 3px; padding-bottom: 1px; margin-top: auto; }
  .ribbon-btn { background: transparent; border: 1px solid transparent; border-radius: 3px; padding: 3px 5px; cursor: default; transition: all 0.15s; display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #333; min-width: 24px; }
  .ribbon-btn:hover { background: #e8e8e8; border-color: #c0c0c0; }

  .font-controls { display: flex; flex-direction: column; gap: 3px; padding: 3px 0; }

  .font-size { background: white; border: 1px solid #c0c0c0; padding: 1px 3px; font-size: 10px; min-width: 30px; display: flex; justify-content: space-between; align-items: center; }
  .styles-gallery { display: flex; gap: 2px; padding: 2px 0; flex: 1; overflow: hidden; align-items: center; }
  .styles-expand { display: flex; flex-direction: column; justify-content: center; align-items: center; background: white; border: 1px solid #c0c0c0; border-radius: 2px; height: 54px; width: 16px; margin-left: 2px; flex-shrink: 0; }
  .styles-expand .arrow { font-size: 8px; color: #555; line-height: 1; padding: 0; }
  .style-thumb { background: white; border: 1px solid #c0c0c0; border-radius: 2px; padding: 5px 8px; min-width: 64px; max-width: 80px; display: flex; flex-direction: column; align-items: center; transition: all 0.15s; height: 54px; justify-content: center; }
  .style-thumb.highlight { background: var(--selection) !important; border-color: var(--word-blue) !important; box-shadow: 0 0 0 2px rgba(43,87,154,0.3); }
  .style-preview { font-size: 9px; line-height: 1; margin-bottom: 2px; text-align: center; }

  .style-thumb.title-thumb.hero { min-width: 78px; max-width: 92px; flex-shrink: 0; background: white; border: 1.5px solid #aaa; padding: 4px 6px 3px; height: 56px; }
  .style-thumb.title-thumb.hero .style-preview-title { font-family: Georgia, 'Times New Roman', serif; font-size: 16px; font-weight: 400; color: #1a1a1a; letter-spacing: -0.3px; line-height: 1; margin-bottom: 2px; }
  .style-thumb.title-thumb.hero .style-name { font-size: 8px; color: #555; text-transform: none; margin-top: 1px; }
  .style-thumb.title-thumb.hero.highlight { background: var(--selection) !important; border-color: var(--word-blue) !important; box-shadow: 0 0 0 2px rgba(43,87,154,0.4), 0 0 12px rgba(43,87,154,0.3); }
  .style-thumb.title-thumb { flex-shrink: 0; }
  .style-thumb.h1-thumb .style-preview { font-size: 11px; font-weight: 600; color: var(--word-blue); }
  .style-thumb.h2-thumb .style-preview { font-size: 10px; font-weight: 600; color: var(--word-blue); }

  .word-doc-area { background: #e6e6e6; padding: 18px; min-height: 380px; display: flex; justify-content: center; position: relative; }
  .word-page { background: white; width: 100%; max-width: 540px; padding: 36px 44px; min-height: 360px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); position: relative; }
  .word-page .doc-line { font-size: 11pt; color: #1a1a1a; font-weight: normal; font-family: 'Aptos', Calibri, sans-serif; transition: all 0.4s ease; margin-bottom: 8px; line-height: 1.4; }
  .word-page .doc-line.style-title { font-size: 26pt; font-weight: 600; color: #1a1a1a; margin-bottom: 12px; line-height: 1.1; border-bottom: 1px solid #ccc; padding-bottom: 4px; }
  .word-page .doc-line.style-h1 { font-size: 16pt; font-weight: 600; color: var(--word-blue); margin-top: 12px; margin-bottom: 8px; }
  .word-page .doc-line.style-h2 { font-size: 13pt; font-weight: 600; color: var(--word-blue); margin-top: 10px; margin-bottom: 6px; }
  .word-page .doc-line.style-h1-purple { font-size: 16pt; font-weight: 600; color: var(--purple); margin-top: 12px; margin-bottom: 8px; }
  .word-page .doc-line.selected { background: var(--selection); }
  .word-cursor { position: absolute; width: 28px; height: 28px; pointer-events: none; z-index: 200; transition: left 0.3s cubic-bezier(0.2, 0.9, 0.3, 1), top 0.3s cubic-bezier(0.2, 0.9, 0.3, 1); filter: drop-shadow(0 3px 8px rgba(233, 30, 126, 0.6)); }
  .word-cursor svg { width: 100%; height: 100%; }

  @keyframes clickPulse { to { transform: translate(-50%, -50%) scale(2.2); opacity: 0; } }
  .word-statusbar { background: var(--word-blue); color: white; padding: 3px 12px; font-size: 10px; display: flex; justify-content: space-between; }

  .concept-grid { display: grid; grid-template-columns: 1fr 1.6fr; gap: 22px; align-items: start; }

const MALE_VOICES = ['Microsoft David','Microsoft Mark','Microsoft Guy','Daniel','Alex','Fred','Thomas','Albert','Bruce','Junior','Ralph','Aaron','Arthur','Gordon','Reed','Rishi','Xander'];
const HARD_EXCLUDE = ['Female','female','Victoria','Samantha','Zira','Hazel','Susan','Karen','Moira','Fiona','Tessa','Veena','Yelena','Zosia'];

function pickMaleVoice(voices) {
  const safe = voices.filter(v => v.name && !HARD_EXCLUDE.some(bad => v.name.includes(bad)));
  let v = null;
  for (const name of MALE_VOICES) { v = safe.find(x => x.name && x.name.includes(name)); if (v) break; }
  if (!v) v = safe.find(x => x.name && /male/i.test(x.name) && !/female/i.test(x.name));
  if (!v) v = safe.find(x => x.lang && x.lang.startsWith('en'));
  return v || null;
}

  const fwCanvasRef = useRef2(null);

  function launchFireworks() {
    const canvas = fwCanvasRef.current;
    if (!canvas) return;
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const ctx = canvas.getContext('2d');
    const particles = [];
    const colors = [BRAND.teal, BRAND.purple, BRAND.magenta, '#FFD700', '#FFFFFF'];
    const emojis = ['💎','✨','⭐','🎉'];
    function burst(x, y) {
      for (let i = 0; i < 60; i++) {
        const angle = (Math.PI * 2 * i) / 60;
        const speed = 3 + Math.random() * 5;
        particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, life: 1, color: colors[Math.floor(Math.random()*colors.length)], size: 2+Math.random()*3, isEmoji: Math.random()<0.15, emoji: emojis[Math.floor(Math.random()*emojis.length)] });
      }
    }
    burst(canvas.width*0.3, canvas.height*0.4);
    setTimeout(() => burst(canvas.width*0.7, canvas.height*0.4), 250);
    setTimeout(() => burst(canvas.width*0.5, canvas.height*0.3), 500);
    setTimeout(() => burst(canvas.width*0.5, canvas.height*0.6), 750);
    let raf;
    function animate() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      for (let i = particles.length-1; i>=0; i--) {
        const p = particles[i];
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.vx*=0.99; p.life-=0.012;
        if (p.life<=0) { particles.splice(i,1); continue; }
        ctx.globalAlpha=p.life;
        if (p.isEmoji) { ctx.font=`${p.size*6}px serif`; ctx.fillText(p.emoji,p.x,p.y); }
        else { ctx.fillStyle=p.color; ctx.shadowBlur=12; ctx.shadowColor=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); }
      }
      ctx.shadowBlur=0; ctx.globalAlpha=1;
      if (particles.length>0) raf=requestAnimationFrame(animate);
      else ctx.clearRect(0,0,canvas.width,canvas.height);
    }
    animate();
    return () => cancelAnimationFrame(raf);
  }

  function startLevel() { setScreen('level'); setLevelIdx(0); setPhase('learn'); }

      )}
      {screen==='finalQuiz' && (

}

<script type="text/babel">
function SeePhase({ level, muted, setMuted, onContinue }) {
  const [step, setStep] = useState2(-1);
  const [cursorPos, setCursorPos] = useState2({ x: 200, y: 280 });
  const [highlightStyleThumb, setHighlightStyleThumb] = useState2(null);
  const [appliedStyles, setAppliedStyles] = useState2({});
  const [selectedLine, setSelectedLine] = useState2(null);
  const [cursorClass, setCursorClass] = useState2('');
  const [playing, setPlaying] = useState2(false);
  const [showCursor, setShowCursor] = useState2(false);
  const wordRootRef = useRef2(null);
  const synthRef = useRef2(typeof window !== 'undefined' ? window.speechSynthesis : null);
  const voiceRef = useRef2(null);
  const cancelRef = useRef2(false);

  useEffect2(() => {
    if (!synthRef.current) return;
    function pick() { const voices = synthRef.current.getVoices(); voiceRef.current = pickMaleVoice(voices); }
    pick();
    if (synthRef.current.onvoiceschanged !== undefined) synthRef.current.onvoiceschanged = pick;
  }, []);

  function lineCoord(lineId) {
    const container = wordRootRef.current;
    if (!lineId || !container) return null;
    const el = container.querySelector(`[data-line-id="${lineId}"]`);
    if (!el) return null;
    const cRect = container.getBoundingClientRect();
    const eRect = el.getBoundingClientRect();
    if (eRect.width===0 && eRect.height===0) return null;
    return { x: eRect.left-cRect.left+28, y: eRect.top-cRect.top+eRect.height/2-14 };
  }

  function thumbCoord(thumbId) {
    const container = wordRootRef.current;
    if (!thumbId || !container) return null;
    const el = container.querySelector(`[data-thumb-id="${thumbId}"]`);
    if (!el) return null;
    const cRect = container.getBoundingClientRect();
    const eRect = el.getBoundingClientRect();
    if (eRect.width===0 && eRect.height===0) return null;
    return { x: eRect.left-cRect.left+eRect.width/2-14, y: eRect.top-cRect.top+eRect.height/2-14 };
  }

  function applyStepVisual(s) {
    setShowCursor(true);
    if (s===0) { setCursorPos({x:180,y:320}); setSelectedLine(null); setAppliedStyles({}); setHighlightStyleThumb(null); setCursorClass(''); }
    else if (s===1) { const tgt=lineCoord(level.targetLineId); if(tgt) setCursorPos(tgt); setCursorClass('click'); }
    else if (s===2) { setSelectedLine(level.targetLineId); setCursorClass(''); }
    else if (s===3) { const tgt=thumbCoord(level.highlightStyleThumb); if(tgt) setCursorPos(tgt); setHighlightStyleThumb(level.highlightStyleThumb); }
    else if (s===4) {
      setCursorClass('click');
      if (level.targetLineId && level.targetStyle) setAppliedStyles({[level.targetLineId]:level.targetStyle});
      if (level.id===4) setAppliedStyles({'h1-bg':'style-h1-purple','h1-themes':'style-h1-purple','h1-next':'style-h1-purple'});
    }
    else if (s===5) { setCursorClass(''); setHighlightStyleThumb(null); }
  }

  function speakLine(text) {
    return new Promise(resolve => {
      if (muted || !synthRef.current || !text) { setTimeout(resolve, 1600); return; }
      try {
        synthRef.current.cancel();
        const u = new SpeechSynthesisUtterance(text);
        if (voiceRef.current) u.voice = voiceRef.current;
        u.rate=0.95; u.pitch=0.85; u.volume=1.0; u.lang='en-US';
        let resolved=false;
        const finish=()=>{ if(!resolved){resolved=true;resolve();} };
        u.onend=finish; u.onerror=finish;
        setTimeout(finish, 4000);
        synthRef.current.speak(u);
      } catch(e) { setTimeout(resolve, 1600); }
    });
  }

  async function runSequence() {
    cancelRef.current=false; setPlaying(true);
    for (let i=0; i<6; i++) {
      if (cancelRef.current) break;
      setStep(i); applyStepVisual(i);
      await speakLine(level.narr[i]);
    }
    setPlaying(false);
  }

  function stopSequence() { cancelRef.current=true; if(synthRef.current) synthRef.current.cancel(); setPlaying(false); }
  function replay() { stopSequence(); setTimeout(()=>runSequence(), 200); }

  useEffect2(() => {
    cancelRef.current=false; setStep(-1); setAppliedStyles({}); setHighlightStyleThumb(null); setSelectedLine(null);
    setShowCursor(true); setCursorPos({x:180,y:320}); setCursorClass(''); setPlaying(false);
    const startTimer=setTimeout(()=>{ runSequence(); }, 800);
    return ()=>{ clearTimeout(startTimer); stopSequence(); };
  }, [level.id]);

  useEffect2(()=>{ if(muted && synthRef.current) synthRef.current.cancel(); }, [muted]);

  const currentNarration = step>=0 ? level.narr[step] : 'Starting demo...';

  return (
    <div>
      <div className="anim-controls">
        <div className="anim-status">{playing?<span className="anim-dot"></span>:null}<span>{playing?`Step ${step+1} of 6`:'Ready'}</span></div>
        <div className="narration-line">{currentNarration}</div>
        <div className="anim-buttons">
          {!playing ? <button className="anim-btn primary" onClick={runSequence}>▶ Play</button> : <button className="anim-btn" onClick={stopSequence}>⏸ Pause</button>}
          <button className="anim-btn" onClick={replay}>↻ Replay</button>
          <button className={`anim-btn ${muted?'muted':''}`} onClick={()=>setMuted(!muted)}>{muted?'🔇 Muted':'🔊 On'}</button>
        </div>
      </div>
      <div style={{position:'relative'}}>
        <WordUI highlightStyleThumb={highlightStyleThumb} appliedStyles={appliedStyles} selectedLine={selectedLine} doc={DOC_LINES} showCursor={showCursor} cursorPos={cursorPos} cursorClass={cursorClass} wordRootRef={wordRootRef} />
      </div>
      <div className="nav-row">
        <span style={{color:'var(--muted)',fontSize:'13px'}}>Watch the demo, then continue</span>
        <button className="btn" onClick={onContinue}>Continue to PROVE phase →</button>
      </div>
    </div>
  );
}
</script>
<script type="text/babel">

  const h1Class = levelId===4 ? 'style-h1-purple' : 'style-h1';

  if (levelId>=3) { styles['h2-resp']='style-h2'; styles['h2-clarity']='style-h2'; styles['h2-cons']='style-h2'; }

function ProvePhase({ level, powerUps, setPowerUps, onCorrect, onNext, isLastLevel }) {
  const [selected, setSelected] = useState2(null);
  const [submitted, setSubmitted] = useState2(false);
  const [removedOptions, setRemovedOptions] = useState2([]);
  const [showHint, setShowHint] = useState2(false);
  const isCorrect = selected===level.quiz.correct;

  function pick(i) { if (submitted||removedOptions.includes(i)) return; setSelected(i); }
  function submit() { if (selected===null) return; setSubmitted(true); if (selected===level.quiz.correct) setTimeout(()=>onCorrect(),600); }
  function useFifty() {
    if (powerUps.fifty<=0||submitted) return;
    setPowerUps({...powerUps,fifty:powerUps.fifty-1});
    const wrongOpts=level.quiz.options.map((_,i)=>i).filter(i=>i!==level.quiz.correct);
    setRemovedOptions(wrongOpts.sort(()=>0.5-Math.random()).slice(0,2));
  }
  function useHint() { if(powerUps.hint<=0||submitted) return; setPowerUps({...powerUps,hint:powerUps.hint-1}); setShowHint(true); }
  function useSkip() { if(powerUps.skip<=0||submitted) return; setPowerUps({...powerUps,skip:powerUps.skip-1}); setSelected(level.quiz.correct); setSubmitted(true); setTimeout(()=>onCorrect(),400); }

  let feedbackContent = null;
  if (submitted) {
    if (isCorrect) {
      feedbackContent = <div className="quiz-feedback correct"><div className="feedback-header">✓ Excellent.</div><div className="feedback-body">{level.quiz.explanation}</div></div>;
    } else {
      const wf = level.quiz.wrongFeedback && level.quiz.wrongFeedback[selected];
      feedbackContent = (
        <div className="quiz-feedback wrong">
          <div className="feedback-header">💡 Close — let's sharpen it.</div>
          <div className="feedback-body">
            {wf ? (<><div style={{marginBottom:'8px'}}>{wf.lead}</div><div dangerouslySetInnerHTML={{__html:wf.body}} /><div className="feedback-takeaway">Takeaway: {wf.takeaway}</div></>) : <div>{level.quiz.explanation}</div>}
          </div>
        </div>
      );
    }
  }

  return (
    <div>
      <div className="compare-grid">
        <div className="compare-panel before">
          <div className="compare-label before">Before</div>
          <div className="compare-word-wrap"><WordUI compact={true} doc={DOC_LINES} appliedStyles={{}} showCursor={false} /></div>
        </div>
        <div className="compare-divider"></div>
        <div className="compare-mobile-arrow">↓</div>
        <div className="compare-panel after">
          <div className="compare-label after">After</div>
          <div className="compare-word-wrap"><WordUI compact={true} doc={DOC_LINES} appliedStyles={getAfterStyles(level.id)} showCursor={false} showTOC={level.id===5} /></div>
        </div>
      </div>
      <div className="powerups">
        <button className="pu-btn" onClick={useFifty} disabled={powerUps.fifty<=0||submitted}>50/50 <span className="pu-count">{powerUps.fifty}</span></button>
        <button className="pu-btn" onClick={useHint} disabled={powerUps.hint<=0||submitted}>💡 Hint <span className="pu-count">{powerUps.hint}</span></button>
        <button className="pu-btn" onClick={useSkip} disabled={powerUps.skip<=0||submitted}>⏩ Skip <span className="pu-count">{powerUps.skip}</span></button>
      </div>
      <div className="quiz">
        <div className="quiz-q">{level.quiz.q}</div>
        {showHint && <div style={{padding:'10px 14px',marginBottom:'14px',background:'rgba(255,215,0,0.08)',borderLeft:'3px solid #FFD700',borderRadius:'6px',fontSize:'13px',color:'var(--text)'}}>💡 Hint: think about what saves the most clicks across the whole document.</div>}
        <div className="quiz-options">
          {level.quiz.options.map((opt,i)=>{
            const removed=removedOptions.includes(i);
            let cls='quiz-opt';
            if (removed) cls+=' disabled';
            else if (submitted&&i===level.quiz.correct) cls+=' correct';
            else if (submitted&&i===selected&&i!==level.quiz.correct) cls+=' wrong';
            else if (selected===i) cls+=' selected';
            return <button key={i} className={cls} onClick={()=>pick(i)} disabled={removed||submitted}>{String.fromCharCode(65+i)}. {removed?'— eliminated —':opt}</button>;
          })}
        </div>
        {feedbackContent}
        <div className="nav-row">
          {!submitted ? (
            <><span style={{color:'var(--muted)',fontSize:'13px'}}>Pick an answer to lock in</span><button className="btn" onClick={submit} disabled={selected===null}>Submit Answer</button></>
          ) : isCorrect ? (
            <><span style={{color:'var(--teal)',fontSize:'14px',fontWeight:600}}>+50 points · Streak +1</span><button className="btn" onClick={onNext}>{isLastLevel?'Final Quiz →':'Next Level →'}</button></>
          ) : (
            <><span style={{color:'#FFC107',fontSize:'13px'}}>Read the takeaway, then keep going</span><button className="btn secondary" onClick={onNext}>Continue →</button></>
          )}
        </div>
      </div>
    </div>
  );
}
</script>
<script type="text/babel">
function WordUI({ highlightStyleThumb, appliedStyles={}, selectedLine, doc, showCursor, cursorPos, cursorClass, compact=false, showTOC=false, wordRootRef, currentLevelId=1 }) {
  const heroStyle = currentLevelId===1?'title':currentLevelId===2?'h1':currentLevelId===3?'h2':currentLevelId===4?'h1':'normal';
  const galleryThumbs = [
    {id:'title',kind:'title'},{id:'h1',kind:'h1'},{id:'h2',kind:'h2'},
    {id:'normal',kind:'normal'},{id:'nospacing',kind:'normal'},{id:'subtitle',kind:'normal'},{id:'strong',kind:'normal'}
  ];
  galleryThumbs.sort((a,b)=>{ if(a.id===heroStyle) return -1; if(b.id===heroStyle) return 1; return 0; });

  function renderThumb(t) {
    const isHero=t.id===heroStyle;
    const isHighlight=highlightStyleThumb===t.id;
    const baseClass=`style-thumb ${t.kind}-thumb ${isHero?'hero':''} ${isHighlight?'highlight':''}`;
    if (t.id === 'h1') return <div key={t.id} className={baseClass} data-thumb-id="h1"><div className="style-preview" style={{color: currentLevelId === 4 ? '#BF80FF' : 'var(--word-blue)'}}>AaBbCcr<br/>Heading 1</div></div>;    if (t.id==='h1') return <div key={t.id} className={baseClass} data-thumb-id="h1"><div className="style-preview">AaBbCc<br/>Heading 1</div></div>;
    if (t.id==='h2') return <div key={t.id} className={baseClass} data-thumb-id="h2"><div className="style-preview">AaBbCcD<br/>Heading 2</div></div>;
    if (t.id==='normal') return <div key={t.id} className={baseClass} data-thumb-id="normal"><div className="style-preview">AaBbCcDdE<br/>Normal</div></div>;
    if (t.id==='nospacing') return <div key={t.id} className={baseClass} data-thumb-id="nospacing"><div className="style-preview">AaBbCcDdE<br/>No Spacing</div></div>;
    if (t.id==='subtitle') return <div key={t.id} className={baseClass} data-thumb-id="subtitle"><div className="style-preview" style={{fontStyle:'italic',color:'#666',fontSize:'9px',letterSpacing:'0.5px'}}>SUBTITLE</div></div>;
    if (t.id==='strong') return <div key={t.id} className={`${baseClass} extra-thumb`} data-thumb-id="strong"><div className="style-preview" style={{fontWeight:700}}>Strong</div></div>;
    return null;
  }

  return (
    <div className={`word-app ${compact?'compact':''}`} ref={wordRootRef}>
      {showCursor && cursorPos && (
        <div className={`word-cursor ${cursorClass||''}`} style={{left:cursorPos.x,top:cursorPos.y}}>
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M3 2 L3 18 L7 14 L10 22 L13 21 L10 13 L17 13 Z" fill="white" stroke="black" strokeWidth="1.2" /></svg>
        </div>
      )}
      <div className="word-titlebar">
        <div className="word-titlebar-left">
          <div className="word-quick"><div className="qa-btn">💾</div><div className="qa-btn">↶</div><div className="qa-btn">↷</div></div>
          <div className="word-autosave"><span className="autosave-pill"><span className="autosave-dot"></span>AutoSave</span><span className="autosave-toggle">●━</span></div>
          <span className="word-title-text">Document Review Summary - DRAFT - Word</span>
        </div>
        <div className="word-search"><span className="search-icon">🔍</span><span className="search-text">Search (Alt+Q)</span></div>
        <div className="word-titlebar-right">
          <span className="word-comments">💬 Comments</span><span className="word-share">↗ Share</span>
          <div className="word-window-controls"><div className="word-wc">_</div><div className="word-wc">▢</div><div className="word-wc close">✕</div></div>
        </div>
      </div>
      <div className="word-menubar">
        <span className="word-menu">File</span><span className="word-menu active">Home</span><span className="word-menu">Insert</span><span className="word-menu">Draw</span><span className="word-menu">Design</span><span className="word-menu">Layout</span><span className="word-menu">References</span><span className="word-menu">Mailings</span><span className="word-menu">Review</span><span className="word-menu">View</span><span className="word-menu">Help</span>
      </div>
      <div className="word-ribbon">
        <div className="ribbon-group" style={{minWidth:'52px'}}>
          <div className="ribbon-group-content"><button className="ribbon-btn large"><span className="icon">📋</span><span style={{fontSize:'8px'}}>Paste</span></button></div>
          <div className="ribbon-group-label">Clipboard</div>
        </div>
        <div className="ribbon-group" style={{minWidth:'140px'}}>
          <div className="ribbon-group-content">
            <div className="font-controls">
              <div className="font-row"><div className="font-name">Aptos (Body) <span>▾</span></div><div className="font-size">11 ▾</div></div>
              <div className="font-row"><button className="ribbon-btn B">B</button><button className="ribbon-btn I">I</button><button className="ribbon-btn U">U</button><button className="ribbon-btn" style={{textDecoration:'line-through'}}>abc</button><button className="ribbon-btn"><span style={{color:BRAND.wordBlue}}>A</span></button></div>
            </div>
          </div>
          <div className="ribbon-group-label">Font</div>
        </div>
        <div className="ribbon-group" style={{minWidth:'60px'}}>
          <div className="ribbon-group-content">
            <div className="font-controls">
              <div className="font-row"><button className="ribbon-btn">≡</button><button className="ribbon-btn">≡</button><button className="ribbon-btn">≡</button></div>
              <div className="font-row"><button className="ribbon-btn">•</button><button className="ribbon-btn">1.</button></div>
            </div>
          </div>
          <div className="ribbon-group-label">Paragraph</div>
        </div>
        <div className="ribbon-group" style={{flex:1,minWidth:'480px'}}>
          <div className="ribbon-group-content">
            <div className="styles-gallery">
              {galleryThumbs.map(renderThumb)}
              <div className="styles-expand"><span className="arrow">▲</span><span className="arrow">▼</span><span className="arrow">⤓</span></div>
            </div>
          </div>
          <div className="ribbon-group-label">Styles</div>
        </div>
      </div>
      <div className="word-styles-actions">
        <span className="action-link"><span className="action-icon">A+</span>Create a Style</span>
        <span className="action-link"><span className="action-icon">A∅</span>Clear Formatting</span>
        <span className="action-link"><span className="action-icon">A↓</span>Apply Styles...</span>
      </div>
      <div className="word-doc-area">
        <div className="word-page">
          {doc.map(line=>{
            const styleClass=appliedStyles[line.id]||'';
            const selClass=selectedLine===line.id?'selected':'';
            return <div key={line.id} data-line-id={line.id} className={`doc-line ${styleClass} ${selClass}`}>{line.text}</div>;
          })}
          {showTOC && (
            <div style={{marginTop:'14px',padding:'10px 12px',border:'1px solid #ccc',background:'#f9f9f9',borderRadius:'4px'}}>
              <div style={{fontWeight:700,fontSize:'11pt',marginBottom:'6px',color:'#1a1a1a'}}>Table of Contents</div>
              <div style={{fontSize:'10pt',color:'#1a1a1a',lineHeight:1.6}}>Background ............................ 1</div>
              <div style={{fontSize:'10pt',color:'#1a1a1a',lineHeight:1.6}}>Key Themes ............................ 2</div>
              <div style={{fontSize:'10pt',color:'#1a1a1a',paddingLeft:'14px',lineHeight:1.6}}>Responsiveness ..................... 2</div>
              <div style={{fontSize:'10pt',color:'#1a1a1a',paddingLeft:'14px',lineHeight:1.6}}>Clarity ............................ 3</div>
              <div style={{fontSize:'10pt',color:'#1a1a1a',paddingLeft:'14px',lineHeight:1.6}}>Consistency ........................ 3</div>
              <div style={{fontSize:'10pt',color:'#1a1a1a',lineHeight:1.6}}>Recommended Next Steps ................ 4</div>
            </div>
          )}
        </div>
      </div>
      <div className="word-statusbar">
        <span>Page 1 of 2 · 159 of 159 words · English (United States)</span>
        <span>📖 ▦ 100% — ● +</span>
      </div>
    </div>
  );
}
</script>
<script type="text/babel">
function FinalQuiz({ qIdx, setQIdx, correct, setCorrect, answered, setAnswered, onComplete, addPoints }) {
  const finalQs = LEVELS.map(l=>({...l.final, levelTitle:l.title}));
  const q = finalQs[qIdx];
  const isLast = qIdx===finalQs.length-1;

  function pick(i) { if(answered!==null) return; setAnswered(i); if(i===q.correct){setCorrect(c=>c+1);addPoints(30);} }
  function next() { if(isLast) onComplete(); else { setQIdx(qIdx+1); setAnswered(null); } }

  return (
    <div className="card">
      <div className="final-q-counter">Final Cumulative Quiz · Question {qIdx+1} of {finalQs.length}</div>
      <h2 style={{fontSize:'20px',marginBottom:'8px',background:`linear-gradient(135deg, ${BRAND.teal}, ${BRAND.magenta})`,WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>Concept review: {q.levelTitle}</h2>
      <div className="quiz">
        <div className="quiz-q">{q.q}</div>
        <div className="quiz-options">
          {q.options.map((opt,i)=>{
            let cls='quiz-opt';
            if (answered!==null&&i===q.correct) cls+=' correct';
            else if (answered===i&&i!==q.correct) cls+=' wrong';
            return <button key={i} className={cls} onClick={()=>pick(i)} disabled={answered!==null}>{String.fromCharCode(65+i)}. {opt}</button>;
          })}
        </div>
        {answered!==null && (
          <div className={`quiz-feedback ${answered===q.correct?'correct':'wrong'}`}>
            <div className="feedback-header">{answered===q.correct?'✓ Correct.':'💡 Reviewing this concept will help.'}</div>
            <div className="feedback-body">{answered===q.correct?'+30 points. Strong recall.':`The strongest answer is "${q.options[q.correct]}". Reviewing the LEARN content for this level will reinforce the why.`}</div>
          </div>
        )}
        <div className="nav-row">
          <span style={{color:'var(--muted)',fontSize:'13px'}}>Score: {correct}/{qIdx+(answered!==null?1:0)}</span>
          <button className="btn" onClick={next} disabled={answered===null}>{isLast?'See Certificate →':'Next Question →'}</button>
        </div>
      </div>
    </div>
  );
}

function Certificate({ points, finalCorrect, recipientName, setRecipientName, onRestart }) {
  const canvasRef = useRef2(null);
  useEffect2(()=>{ drawCert(); }, [recipientName, points, finalCorrect]);

  function drawCert() {
    const canvas=canvasRef.current; if(!canvas) return;
    const W=1100, H=760; canvas.width=W; canvas.height=H;
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H);
    const grad=ctx.createLinearGradient(0,0,W,H);
    grad.addColorStop(0,BRAND.teal); grad.addColorStop(0.5,BRAND.purple); grad.addColorStop(1,BRAND.magenta);
    ctx.strokeStyle=grad; ctx.lineWidth=12; ctx.strokeRect(20,20,W-40,H-40);
    ctx.strokeStyle='#cccccc'; ctx.lineWidth=1; ctx.strokeRect(50,50,W-100,H-100);
    ctx.fillStyle=grad; ctx.fillRect(W/2-40,90,80,80);
    ctx.fillStyle='white'; ctx.font='bold 28px sans-serif'; ctx.textAlign='center'; ctx.fillText('DS',W/2,138);
    ctx.fillStyle='#333'; ctx.font='bold 20px sans-serif'; ctx.fillText('DR.DE.SOUZ.AI',W/2,200);
    ctx.font='13px sans-serif'; ctx.fillStyle='#888'; ctx.fillText('AI Literacy · Letramento em IA',W/2,222);
    ctx.fillStyle=BRAND.purple; ctx.font='bold 44px serif'; ctx.fillText('Certificate of Completion',W/2,290);
    ctx.fillStyle='#555'; ctx.font='16px sans-serif'; ctx.fillText('This certifies that',W/2,340);
    ctx.fillStyle='#1a1a1a'; ctx.font='bold italic 38px serif'; ctx.fillText(recipientName||'Morgan Lewis Attendee',W/2,400);
    const nameWidth=ctx.measureText(recipientName||'Morgan Lewis Attendee').width;
    ctx.strokeStyle=BRAND.teal; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(W/2-nameWidth/2-20,415); ctx.lineTo(W/2+nameWidth/2+20,415); ctx.stroke();
    ctx.fillStyle='#333'; ctx.font='17px sans-serif'; ctx.fillText('has successfully completed the',W/2,450);
    ctx.fillStyle=BRAND.magenta; ctx.font='bold 24px sans-serif'; ctx.fillText('Word Styles Microlearning Module',W/2,485);
    ctx.fillStyle='#555'; ctx.font='15px sans-serif'; ctx.fillText('Morgan Lewis Technology Instructor Demo · 5 Levels · Final Quiz',W/2,512);
    ctx.fillStyle='#1a1a1a'; ctx.font='bold 16px sans-serif'; ctx.fillText(`Points Earned: ${points}   ·   Final Quiz: ${finalCorrect}/5`,W/2,565);
    const today=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
    ctx.fillStyle='#666'; ctx.font='14px sans-serif'; ctx.textAlign='left'; ctx.fillText('Date',180,660);
    ctx.fillStyle='#1a1a1a'; ctx.fillText(today,180,685);
    ctx.strokeStyle='#aaa'; ctx.beginPath(); ctx.moveTo(180,670); ctx.lineTo(380,670); ctx.stroke();
    ctx.fillStyle='#666'; ctx.fillText('Instructor',W-380,660);
    ctx.fillStyle='#1a1a1a'; ctx.font='italic 16px serif'; ctx.fillText('Dr. De SouzAI',W-380,685);
    ctx.strokeStyle='#aaa'; ctx.beginPath(); ctx.moveTo(W-380,670); ctx.lineTo(W-180,670); ctx.stroke();
    ctx.fillStyle='#888'; ctx.font='12px sans-serif'; ctx.textAlign='center'; ctx.fillText('mrdesouzaphd-cmyk.github.io/word-styles-microlearning-v2 · Built with React',W/2,720);
  }

  function downloadPNG() {
    const link=document.createElement('a');
    link.download=`Word-Styles-Certificate-${(recipientName||'Attendee').replace(/\s/g,'-')}.png`;
    link.href=canvasRef.current.toDataURL('image/png'); link.click();
  }
  function downloadPDF() {
    const imgData=canvasRef.current.toDataURL('image/png');
    const { jsPDF }=window.jspdf;
    const pdf=new jsPDF({orientation:'landscape',unit:'pt',format:[1100,760]});
    pdf.addImage(imgData,'PNG',0,0,1100,760);
    pdf.save(`Word-Styles-Certificate-${(recipientName||'Attendee').replace(/\s/g,'-')}.pdf`);
  }

  return (
    <div className="card cert-wrap">
      <h1 style={{fontSize:'34px',marginBottom:'10px',background:`linear-gradient(135deg, ${BRAND.teal}, ${BRAND.magenta})`,WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>🎓 Module Complete!</h1>
      <p style={{color:'var(--muted)',marginBottom:'18px'}}>Final score: <strong style={{color:'var(--teal)'}}>{points} points</strong> · Quiz: <strong style={{color:'var(--magenta)'}}>{finalCorrect}/5</strong></p>
      <input className="cert-input" type="text" placeholder="Type your name to personalize the certificate" value={recipientName} onChange={(e)=>setRecipientName(e.target.value)} />
      <div className="cert-canvas-wrap"><canvas ref={canvasRef} /></div>
      <div className="cert-buttons">
        <button className="btn" onClick={downloadPDF}>📄 Download PDF</button>
        <button className="btn" onClick={downloadPNG}>🖼️ Download PNG</button>
        <button className="btn secondary" onClick={onRestart}>↻ Restart Module</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
